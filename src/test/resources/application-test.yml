spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9093}
    consumer:
      group-id: test-group
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.nihongodev.platform.domain.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

app:
  jwt:
    secret: test-secret-key-for-testing-purposes-only-must-be-long-enough
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  kafka:
    topics:
      user-events:
        name: user-events
        partitions: 1
        replicas: 1
      lesson-events:
        name: lesson-events
        partitions: 1
        replicas: 1
      quiz-events:
        name: quiz-events
        partitions: 1
        replicas: 1
      interview-events:
        name: interview-events
        partitions: 1
        replicas: 1
      progress-events:
        name: progress-events
        partitions: 1
        replicas: 1
      vocabulary-events:
        name: vocabulary-events
        partitions: 1
        replicas: 1
      correction-events:
        name: correction-events
        partitions: 1
        replicas: 1
      notification-events:
        name: notification-events
        partitions: 1
        replicas: 1
      cv-generator-events:
        name: cv-generator-events
        partitions: 1
        replicas: 1
      dead-letter-events:
        name: dead-letter-events
        partitions: 1
        replicas: 1
