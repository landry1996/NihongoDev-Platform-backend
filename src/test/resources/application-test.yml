spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=current_role
    driver-class-name: org.h2.Driver
    username: sa
    password:
  mail:
    host: localhost
    port: 3025

app:
  jwt:
    secret: test-secret-key-for-testing-purposes-only-must-be-long-enough
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  kafka:
    topics:
      user-events:
        name: user-events
        partitions: 1
        replicas: 1
      lesson-events:
        name: lesson-events
        partitions: 1
        replicas: 1
      quiz-events:
        name: quiz-events
        partitions: 1
        replicas: 1
      interview-events:
        name: interview-events
        partitions: 1
        replicas: 1
      progress-events:
        name: progress-events
        partitions: 1
        replicas: 1
      vocabulary-events:
        name: vocabulary-events
        partitions: 1
        replicas: 1
      correction-events:
        name: correction-events
        partitions: 1
        replicas: 1
      notification-events:
        name: notification-events
        partitions: 1
        replicas: 1
      cv-generator-events:
        name: cv-generator-events
        partitions: 1
        replicas: 1
      dead-letter-events:
        name: dead-letter-events
        partitions: 1
        replicas: 1
