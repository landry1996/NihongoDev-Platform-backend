spring:
  application:
    name: nihongodev-platform
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: nihongodev-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  kafka:
    topics:
      user-events:
        name: user-events
        partitions: 3
        replicas: 1
      lesson-events:
        name: lesson-events
        partitions: 3
        replicas: 1
      quiz-events:
        name: quiz-events
        partitions: 3
        replicas: 1
      interview-events:
        name: interview-events
        partitions: 3
        replicas: 1
      progress-events:
        name: progress-events
        partitions: 3
        replicas: 1
      vocabulary-events:
        name: vocabulary-events
        partitions: 3
        replicas: 1
      correction-events:
        name: correction-events
        partitions: 3
        replicas: 1
      notification-events:
        name: notification-events
        partitions: 3
        replicas: 1
