spring:
  application:
    name: nihongodev-platform
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: nihongodev-group
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.nihongodev.platform.domain.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 2MB

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 2MB
    max-swallow-size: 2MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  mail:
    from: ${MAIL_FROM:noreply@nihongodev.com}
  llm:
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:claude-sonnet-4-6-20250514}
    base-url: ${LLM_BASE_URL:https://api.anthropic.com}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Request-ID
  kafka:
    topics:
      user-events:
        name: user-events
        partitions: 3
        replicas: 1
      lesson-events:
        name: lesson-events
        partitions: 3
        replicas: 1
      quiz-events:
        name: quiz-events
        partitions: 3
        replicas: 1
      interview-events:
        name: interview-events
        partitions: 3
        replicas: 1
      progress-events:
        name: progress-events
        partitions: 3
        replicas: 1
      vocabulary-events:
        name: vocabulary-events
        partitions: 3
        replicas: 1
      correction-events:
        name: correction-events
        partitions: 3
        replicas: 1
      notification-events:
        name: notification-events
        partitions: 3
        replicas: 1
      cultural-events:
        name: cultural-events
        partitions: 3
        replicas: 1
      cv-generator-events:
        name: cv-generator-events
        partitions: 3
        replicas: 1
      dead-letter-events:
        name: dead-letter-events
        partitions: 1
        replicas: 1
