spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    show-sql: false
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

logging:
  level:
    com.nihongodev: INFO
    org.springframework.security: WARN
    root: WARN

app:
  cors:
    allowed-origins: https://nihongodev.com,https://app.nihongodev.com
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Request-ID

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
